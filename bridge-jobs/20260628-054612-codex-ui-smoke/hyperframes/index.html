<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Codex UI Smoke</title>
  <style>
    body { margin: 0; background: #11151b; color: #f8f4e8; font-family: Arial, sans-serif; }
    [data-composition-id="root"] { position: relative; width: 1080px; height: 1920px; overflow: hidden; background: #11151b; }
    .clip { position: absolute; inset: 0; overflow: hidden; }
    .scene-image { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; filter: saturate(1.08) contrast(1.05); }
    .vignette { position: absolute; inset: 0; background: linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.62)); }
    .scene-copy { position: absolute; left: 72px; right: 72px; bottom: 118px; display: flex; flex-direction: column; gap: 18px; }
    .kicker { color: #f0c35a; font-size: 28px; font-weight: 800; text-transform: uppercase; }
    h1 { margin: 0; max-width: 920px; color: #fffaf0; font-size: 86px; line-height: 1.02; font-weight: 900; }
    p { margin: 0; max-width: 880px; color: #f1ead9; font-size: 36px; line-height: 1.24; font-weight: 700; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
</head>
<body>
  <div data-composition-id="root" data-start="0" data-duration="6.400" data-width="1080" data-height="1920">
    
      <section id="scene-001" class="clip scene" data-start="0.000" data-duration="3.200" data-track-index="1">
        <img class="scene-image" src="assets/001-scene-01.svg" crossorigin="anonymous" alt="">
        <div class="vignette"></div>
        <div class="scene-copy">
          <div class="kicker">Scene 01 · zoom-in</div>
          <h1>Hook</h1>
          <p>Opening line</p>
        </div>
      </section>
      <section id="scene-002" class="clip scene" data-start="3.200" data-duration="3.200" data-track-index="1">
        <img class="scene-image" src="assets/002-scene-02.svg" crossorigin="anonymous" alt="">
        <div class="vignette"></div>
        <div class="scene-copy">
          <div class="kicker">Scene 02 · pan-left-right</div>
          <h1>Proof</h1>
          <p>Proof line</p>
        </div>
      </section>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      
      tl.from("#scene-001 .scene-image", { scale: 1.06, opacity: 0.72, duration: 0.65, ease: "power2.out" }, 0.100);
      tl.from("#scene-001 .kicker", { y: 24, opacity: 0, duration: 0.45, ease: "expo.out" }, 0.250);
      tl.from("#scene-001 h1", { y: 38, opacity: 0, duration: 0.6, ease: "power3.out" }, 0.380);
      tl.from("#scene-001 p", { y: 28, opacity: 0, duration: 0.5, ease: "sine.out" }, 0.550);
      tl.from("#scene-002 .scene-image", { scale: 1.06, opacity: 0.72, duration: 0.65, ease: "power2.out" }, 3.300);
      tl.from("#scene-002 .kicker", { y: 24, opacity: 0, duration: 0.45, ease: "expo.out" }, 3.450);
      tl.from("#scene-002 h1", { y: 38, opacity: 0, duration: 0.6, ease: "power3.out" }, 3.580);
      tl.from("#scene-002 p", { y: 28, opacity: 0, duration: 0.5, ease: "sine.out" }, 3.750);
      window.__timelines["root"] = tl;
    </script>
  </div>
</body>
</html>
